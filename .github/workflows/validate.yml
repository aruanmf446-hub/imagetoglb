name: Validate app

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate JavaScript syntax
        run: |
          node --check app.js
          node --check api/generate.js
          node --check api/task.js
          node --check api/rig.js
          node --check api/download.js
          node --check api/status.js
      - name: Validate required files
        run: |
          test -f index.html
          test -f styles.css
          test -f vercel.json
          test -f .env.example
